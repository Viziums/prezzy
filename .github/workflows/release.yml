name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  verify-version:
    name: Verify tag matches Cargo.toml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check version consistency
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          cargo_version=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "::error::Tag version ($tag_version) does not match Cargo.toml version ($cargo_version)"
            exit 1
          fi
          echo "Version $tag_version verified."

  build:
    name: Build (${{ matrix.target }})
    needs: verify-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../prezzy-${{ matrix.target }}.tar.gz prezzy
          cd ../../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../prezzy-${{ matrix.target }}.zip prezzy.exe
          cd ../../..

      - uses: actions/upload-artifact@v4
        with:
          name: prezzy-${{ matrix.target }}
          path: prezzy-*

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  publish-npm:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Prepare npm package
        run: |
          cp README.md packaging/npm/README.md
          cd packaging/npm
          npm version "${{ steps.version.outputs.version }}" --no-git-tag-version

      - name: Publish
        run: |
          cd packaging/npm
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  update-homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release tarballs and compute checksums
        id: checksums
        run: |
          BASE_URL="https://github.com/viziums/prezzy/releases/download/${GITHUB_REF_NAME}"
          for target in x86_64-apple-darwin aarch64-apple-darwin x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
            curl -fSL -o "prezzy-${target}.tar.gz" "${BASE_URL}/prezzy-${target}.tar.gz"
            sha=$(sha256sum "prezzy-${target}.tar.gz" | awk '{print $1}')
            key=$(echo "$target" | tr '-' '_')
            echo "${key}=${sha}" >> "$GITHUB_OUTPUT"
          done

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: viziums/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        run: |
          cat > Formula/prezzy.rb << 'FORMULA'
          class Prezzy < Formula
            desc "Make any CLI output beautiful. Zero config. Just pipe."
            homepage "https://github.com/viziums/prezzy"
            version "VERSION_PLACEHOLDER"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/viziums/prezzy/releases/download/vVERSION_PLACEHOLDER/prezzy-aarch64-apple-darwin.tar.gz"
                sha256 "SHA_AARCH64_APPLE_DARWIN"
              else
                url "https://github.com/viziums/prezzy/releases/download/vVERSION_PLACEHOLDER/prezzy-x86_64-apple-darwin.tar.gz"
                sha256 "SHA_X86_64_APPLE_DARWIN"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/viziums/prezzy/releases/download/vVERSION_PLACEHOLDER/prezzy-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "SHA_AARCH64_UNKNOWN_LINUX_GNU"
              else
                url "https://github.com/viziums/prezzy/releases/download/vVERSION_PLACEHOLDER/prezzy-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "SHA_X86_64_UNKNOWN_LINUX_GNU"
              end
            end

            def install
              bin.install "prezzy"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/prezzy --version")
              assert_match "name", pipe_output("#{bin}/prezzy --color=never", '{"name":"test"}')
            end
          end
          FORMULA

          # Replace placeholders
          sed -i "s/VERSION_PLACEHOLDER/${{ steps.version.outputs.version }}/g" Formula/prezzy.rb
          sed -i "s/SHA_AARCH64_APPLE_DARWIN/${{ steps.checksums.outputs.aarch64_apple_darwin }}/g" Formula/prezzy.rb
          sed -i "s/SHA_X86_64_APPLE_DARWIN/${{ steps.checksums.outputs.x86_64_apple_darwin }}/g" Formula/prezzy.rb
          sed -i "s/SHA_AARCH64_UNKNOWN_LINUX_GNU/${{ steps.checksums.outputs.aarch64_unknown_linux_gnu }}/g" Formula/prezzy.rb
          sed -i "s/SHA_X86_64_UNKNOWN_LINUX_GNU/${{ steps.checksums.outputs.x86_64_unknown_linux_gnu }}/g" Formula/prezzy.rb

          # Fix indentation (heredoc adds extra spaces)
          sed -i 's/^          //' Formula/prezzy.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/prezzy.rb
          git commit -m "Update prezzy to ${{ steps.version.outputs.version }}"
          git push
